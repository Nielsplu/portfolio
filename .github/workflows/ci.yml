name: CI/CD

# Pipeline unique : qualité → build → déploiement.
# - Sur pull request : qualité + build (validation, sans déploiement).
# - Sur push vers main : qualité + build + déploiement GitHub Pages.
# Chaque étape est une barrière : rien n'est déployé si le lint, les types,
# les tests ou le build échouent.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege par défaut ; le job de déploiement élève ses droits.
permissions:
  contents: read

# Annule les exécutions superflues sur les PR (feedback rapide) mais jamais
# sur main, pour ne pas interrompre un déploiement en cours.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Qualité (lint · types · tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test

  build:
    name: Build statique
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm run generate
      - name: Téléverser l'artefact Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: .output/public

  deploy:
    name: Déploiement GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
