name: Dependabot auto-merge

# Active l'auto-merge sur les PR ouvertes par Dependabot : GitHub les fusionne
# automatiquement dès que les checks requis (qualité + build) passent. Une mise
# à jour qui casse la CI reste ouverte au lieu d'atteindre main.
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Activer l'auto-merge (squash)
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
